services:
  - type: web
    name: vnm-gnm-frontend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run preview
    envVars:
      - key: VITE_API_URL
        value: https://vnm-gnm-backend.onrender.com/api

  - type: web
    name: vnm-gnm-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CORS_ORIGIN
        value: https://vnm-gnm-frontend.onrender.com

  - type: web
    name: vnm-gnm-ocr
    env: python
    rootDir: ocr-service
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
